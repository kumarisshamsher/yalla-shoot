<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/yallashoot-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Basic -->
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_SEO_DESCRIPTION%" />
    <meta name="keywords" content="%VITE_SEO_KEYWORDS%" />
    <meta name="author" content="%VITE_SEO_AUTHOR%" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%VITE_SEO_URL%" />

    <!-- Open Graph (Facebook, WhatsApp...) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SEO_URL%" />
    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_SEO_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_SEO_IMAGE%" />
    <meta property="og:locale" content="%VITE_SEO_LOCALE%" />
    <meta property="og:site_name" content="%VITE_HEADER_TITLE%" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="%VITE_SEO_TWITTER%" />
    <meta name="twitter:title" content="%VITE_APP_TITLE%" />
    <meta name="twitter:description" content="%VITE_SEO_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SEO_IMAGE%" />

    <script>
      (function() {
        try {
          var saved = localStorage.getItem('yalla_theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var enableDark = saved ? (saved === 'dark') : prefersDark;
          if (enableDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
